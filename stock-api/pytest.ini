[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
addopts =
    --strict-markers
    --cov=api
    --cov=job
    --cov=util
    --cov=get
    --cov=prompt
    --cov-report=term-missing
    --cov-fail-under=80
